# CI dispatch marker 2026-04-10
name: CI Standard
# Refreshed to sync with local correct paths
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/**"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/**"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Dispatcher: route to self-hosted if available ──────────────────────────
  pick-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check for self-hosted runner
        id: check
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: |
          ONLINE=$(gh api /orgs/${{ github.repository_owner }}/actions/runners \
            --jq '[.runners[] | select(.status == "online") | select(.labels[].name == "d-sorg-fleet")] | length' \
            2>/dev/null || echo "0")
          if [[ "$ONLINE" -gt 0 ]]; then
            echo "runner=d-sorg-fleet" >> $GITHUB_OUTPUT
            echo "Self-hosted runner online — routing locally"
          else
            echo "runner=ubuntu-latest" >> $GITHUB_OUTPUT
            echo "No self-hosted runner — using GitHub-hosted"
          fi
  quality-gate:
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install ruff==0.14.10 black==26.1.0 mypy==1.13.0 bandit==1.7.7 pydocstyle==6.3.0

      # Validate that CI tool versions match pre-commit config
      - name: Check Tool Version Consistency
        run: |
          echo "Validating tool versions match .pre-commit-config.yaml..."

          # Check Black version
          if ! grep -q "rev: 26.1.0" .pre-commit-config.yaml; then
            echo "::error::Black version mismatch between CI and pre-commit config"
            exit 1
          fi

          # Check Ruff version
          if ! grep -q "rev: v0.14.10" .pre-commit-config.yaml; then
            echo "::error::Ruff version mismatch between CI and pre-commit config"
            exit 1
          fi

          # Check MyPy version
          if ! grep -q "rev: v1.13.0" .pre-commit-config.yaml; then
            echo "::error::MyPy version mismatch between CI and pre-commit config"
            exit 1
          fi

          echo "✓ All tool versions are consistent"

      # FIX: Less aggressive Ruff (Errors, Warnings, Imports only)
      - name: Lint
        run: ruff check .

      # FIX: Enforce Black formatting (88 chars)
      - name: Check Formatting
        run: black --check .

      - run: pip install mypy types-PyYAML types-requests
      - run: pip install -r requirements.lock
      # Type checking is advisory while the codebase is being annotated.
      # Tracked for enforcement in a future sprint.
      - name: Type Check (advisory)
        continue-on-error: true
        run: mypy scripts/ tools/ *.py --ignore-missing-imports

      # Placeholder detection
      - name: Verify No Placeholders
        run: |
          violations=$(
            find . \( -path "./.git" -o -path "./.mypy_cache" -o -path "./.ruff_cache" -o -path "./__pycache__" -o -path "./archive" -o -path "./.venv" \) -prune -o -type f -name "*.py" -print0 \
              | xargs -0 grep -nE "TODO|FIXME" --include="*.py" || true
          )
          # Filter out quality check files which legitimately contain these patterns
          filtered=$(echo "$violations" | grep -v "quality_check" || true)
          if [ -n "$filtered" ]; then
            echo "$filtered"
            echo "::error::Placeholders found. Remove TODOs/FIXMEs or create tracked GitHub issues."
            exit 1
          fi

      # FIX: Run Python-based MATLAB Quality Check (Works without License)
      # Non-blocking, archives results for legacy support
      - name: MATLAB Quality Check
        continue-on-error: true
        run: |
          python tools/matlab_utilities/scripts/matlab_quality_check.py --output-format text > matlab_quality_report.txt
          cat matlab_quality_report.txt

      - name: Upload MATLAB Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: matlab-quality-report
          path: matlab_quality_report.txt

  # Assessment E: Security scanning for dependency vulnerabilities
  security-scan:
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit Python Dependencies
        run: |
          echo "Scanning for known vulnerabilities..."
          pip-audit -r requirements.txt --progress-spinner=off || true

  tests:
    needs: [pick-runner, quality-gate]
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    strategy:
      matrix:
        python: ["3.11"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -r requirements.lock
      - run: pip install -e .
      - name: Install SDL dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libsdl2-mixer-dev libsdl2-image-dev libsdl2-ttf-dev xvfb
      - name: Run tests with coverage
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: disk
        run: xvfb-run -a pytest tests/ --cov=src/games/shared --cov-branch --cov-report=xml --cov-report=term-missing --timeout=60
      - uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        if: env.CODECOV_TOKEN != ''
        with:
          fail_ci_if_error: true # BLOCKING: Requires CODECOV_TOKEN secret to be configured
          token: ${{ secrets.CODECOV_TOKEN }}

  # =============================================================================
  # RUST QUALITY GATE (Conditional)
  # =============================================================================
  # No-op until Rust code is added. Activates when Cargo.toml is present.
  # Enforces: format (rustfmt), lint (clippy), tests (cargo test), audit.
  # =============================================================================
  rust-quality-gate:
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for Rust changes
        id: rust-changes
        run: |
          if [ ! -f "Cargo.toml" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No Cargo.toml found — Rust quality gate skipped (no Rust code yet)."
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}"
            BASE_SHA=$(git merge-base "origin/${{ github.base_ref }}" HEAD || true)
            if [ -z "$BASE_SHA" ]; then
              BASE_SHA="${{ github.event.pull_request.base.sha }}"
            fi
            RUST_FILES=$(git diff --name-only "$BASE_SHA" HEAD -- '*.rs' 'Cargo.toml' '*/Cargo.toml' 'rust-toolchain.toml' || true)
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            RUST_FILES=$(git diff --name-only "${{ github.event.before }}" HEAD -- '*.rs' 'Cargo.toml' '*/Cargo.toml' 'rust-toolchain.toml' || true)
          else
            RUST_FILES=$(git diff --name-only HEAD~1 HEAD -- '*.rs' 'Cargo.toml' '*/Cargo.toml' 'rust-toolchain.toml' || echo "")
          fi

          if [ -n "$RUST_FILES" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed Rust files:"
            echo "$RUST_FILES"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No Rust changes detected — skipping Rust quality gate."
          fi

      - name: Install Rust toolchain
        if: steps.rust-changes.outputs.has_changes == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build
        if: steps.rust-changes.outputs.has_changes == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format Check (rustfmt)
        if: steps.rust-changes.outputs.has_changes == 'true'
        run: cargo fmt --all -- --check

      - name: Lint (Clippy)
        if: steps.rust-changes.outputs.has_changes == 'true'
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Rust Tests
        if: steps.rust-changes.outputs.has_changes == 'true'
        run: cargo test

      - name: Security Audit (cargo-audit)
        if: steps.rust-changes.outputs.has_changes == 'true'
        run: |
          cargo install cargo-audit --locked || true
          cargo audit

      - name: Rust Quality Gate Summary
        if: steps.rust-changes.outputs.has_changes == 'true'
        run: |
          echo "## Rust Quality Gate" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ rustfmt: formatted" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ clippy: no warnings" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ cargo test: all tests pass" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ cargo audit: no known vulnerabilities" >> $GITHUB_STEP_SUMMARY

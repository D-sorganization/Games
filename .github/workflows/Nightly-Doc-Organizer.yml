name: Weekly Documentation Organizer

on:
  schedule:
    - cron: "0 8 * * 2" # Weekly on Tuesday at 8 AM UTC (midnight PST)
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ── Dispatcher: route to self-hosted if available ──────────────────────────
  pick-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check for self-hosted runner
        id: check
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: |
          ONLINE=$(gh api /orgs/${{ github.repository_owner }}/actions/runners \
            --jq '[.runners[] | select(.status == "online") | select(.labels[].name == "d-sorg-fleet")] | length' \
            2>/dev/null || echo "0")
          if [[ "$ONLINE" -gt 0 ]]; then
            echo "runner=d-sorg-fleet" >> $GITHUB_OUTPUT
            echo "Self-hosted runner online — routing locally"
          else
            echo "runner=ubuntu-latest" >> $GITHUB_OUTPUT
            echo "No self-hosted runner — using GitHub-hosted"
          fi
  organize-docs:
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    if: hashFiles('.github/WORKFLOWS_PAUSED') == ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Organize Docs
        run: |
          mkdir -p docs/maintenance
          echo "# Games Repo Workflow Status" > docs/maintenance/WORKFLOWS.md
          echo "Automated cleanup and organization." >> docs/maintenance/WORKFLOWS.md

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: nightly documentation organization"
          file_pattern: "docs/maintenance/*"

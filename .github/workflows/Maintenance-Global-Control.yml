name: Maintenance Global Control

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "pause"
        type: choice
        options:
          - pause
          - resume
      reason:
        description: "Reason for pause/resume"
        required: false
        default: "Maintenance"

jobs:

  # ── Dispatcher: route to self-hosted if available ──────────────────────────
  pick-runner:
    runs-on: self-hosted
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check for self-hosted runner
        id: check
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: |
          ONLINE=$(gh api /orgs/${{ github.repository_owner }}/actions/runners \
            --jq '[.runners[] | select(.status == "online") | select(.labels[].name == "d-sorg-fleet")] | length' \
            2>/dev/null || echo "0")
          if [[ "$ONLINE" -gt 0 ]]; then
            echo "runner=d-sorg-fleet" >> $GITHUB_OUTPUT
            echo "Self-hosted runner online — routing locally"
          else
            echo "runner=ubuntu-latest" >> $GITHUB_OUTPUT
            echo "No self-hosted runner — using GitHub-hosted"
          fi
  control:
    needs: pick-runner
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Pause State
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.action }}" == "pause" ]; then
            echo "Paused by workflow dispatch" > .github/WORKFLOWS_PAUSED
            echo "Reason: ${{ inputs.reason }}" >> .github/WORKFLOWS_PAUSED
            git add .github/WORKFLOWS_PAUSED
            git commit -m "chore(maintenance): pause workflows [${{ inputs.reason }}]"
            git push
          else
            rm -f .github/WORKFLOWS_PAUSED
            git add .github/WORKFLOWS_PAUSED || true
            git commit -m "chore(maintenance): resume workflows"
            git push
          fi

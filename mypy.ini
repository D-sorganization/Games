[mypy]
python_version = 3.11
ignore_missing_imports = True
check_untyped_defs = False
disallow_untyped_defs = False
explicit_package_bases = True
namespace_packages = True
mypy_path = src

# Exclude vendored/generated paths
exclude = (?x)(
    ^src/shared/python/
    | ^.venv/
    | ^venv/
    | ^__pycache__/
    | ^node_modules/
    | ^archive/
    | ^tests/
  )
